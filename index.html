<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue des formations commercialisées</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <div class="header-brand">
          <img
            class="header-logo"
            src="https://graad-sante.fr/app/uploads/2024/09/LOGO_GRAAD_SANTE_GOLD-1024x455.png"
            alt="Logo Graad Santé"
          >
        </div>

        <div class="header-inner">
          <p class="eyebrow">Catalogue interne</p>
          <h1>Catalogue des formations commercialisées</h1>
          <p class="subtitle" id="subtitle-text">
            Catalogue mis à jour à partir d’un export Notion
          </p>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="filters">
      <div class="filter-group filter-search">
        <label for="search">Recherche</label>
        <input
          type="text"
          id="search"
          placeholder="Rechercher par titre, numéro, public, contexte..."
        >
      </div>

      <div class="filter-group">
        <label for="filter-format">Format</label>
        <select id="filter-format">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-public">Public concerné</label>
        <select id="filter-public">
          <option value="">Tous</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filter-typologie">Typologie</label>
        <select id="filter-typologie">
          <option value="">Toutes</option>
        </select>
      </div>
    </section>

    <section class="topbar">
      <p id="results-count">Chargement...</p>
    </section>

    <section id="results" class="cards"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
